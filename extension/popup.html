<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 10px;
      margin-bottom: 14px;
      border: 1px solid #e5e5e5;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc2626;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.connected {
      background: #16a34a;
      box-shadow: 0 0 6px #16a34a60;
    }

    .status-text {
      font-size: 12px;
      color: #888;
    }

    .status-text.connected { color: #16a34a; }

    .connect-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .connect-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .connect-btn:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .connect-btn:disabled {
      opacity: 0.6;
      cursor: default;
      transform: none;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">F</div>
    <h1>Friday Browser Bridge</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking...</span>
  </div>

  <button class="connect-btn" id="connectBtn">Connect</button>

  <div class="footer">Companion for Project Friday</div>

  <script src="popup.js"></script>
</body>
</html>
