<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Friday Setup</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .field {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: #f8fafc;
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }
        button:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
        }
        .error {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Friday Setup</h1>
        <p>To get started, please provide your API keys. These are stored securely on your machine.</p>
        
        <form id="setupForm">
            <div class="field">
                <label for="geminiKey">Gemini API Key</label>
                <input type="password" id="geminiKey" placeholder="Paste your Gemini API key here" required>
            </div>
            
            <div class="field">
                <label for="zepKey">Zep API Key (Optional)</label>
                <input type="password" id="zepKey" placeholder="Paste your Zep API key here">
            </div>

            <div id="errorMessage" class="error">Please provide a valid Gemini API key.</div>
            
            <button type="submit">Complete Setup</button>
        </form>
        
        <div class="footer">
            Friday securely encrypts your keys locally.
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        document.getElementById('setupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const geminiKey = document.getElementById('geminiKey').value.trim();
            const zepKey = document.getElementById('zepKey').value.trim();
            
            if (!geminiKey) {
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }

            ipcRenderer.send('setup:submit', { geminiKey, zepKey });
        });
    </script>
</body>
</html>
