<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Project Friday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/free/stroke-rounded.css">
</head>

<body>
    <!-- Header -->
    <header id="header" class="glass">
        <div class="container-wide nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Friday Logo">
                <span class="text-gradient-green">FRIDAY</span>
            </a>

            <nav class="nav-links">
                <a href="index.html">Product</a>
                <a href="about.html">Company</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="nav-actions">
                <button class="theme-toggle-btn glass" id="themeBtn" title="Toggle theme">
                    <i class="hugeicons-sun-01" id="themeIcon"></i>
                </button>
                <button class="btn btn-primary" id="downloadNavBtn">Get Friday</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero section-padding">
            <div class="container">
                <div class="hero-content" data-reveal>
                    <h1 class="text-gradient-green">Get in Touch</h1>
                    <p>Have questions or feedback? We'd love to hear from you.</p>
                </div>
                
                <div class="contact-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 80px;">
                    <div class="feature-card glass" data-reveal>
                        <div class="feature-icon">
                            <i class="hugeicons-mail-01"></i>
                        </div>
                        <h3>Email Us</h3>
                        <p>For support or business inquiries:</p>
                        <a href="mailto:isaacokwuzi@gmail.com" class="text-gradient-green" style="font-weight: 600; font-size: 1.1rem;">isaacokwuzi@gmail.com</a>
                    </div>
                    
                    <div class="feature-card glass" data-reveal>
                        <div class="feature-icon">
                            <i class="hugeicons-new-twitter"></i>
                        </div>
                        <h3>Follow on X</h3>
                        <p>Direct updates and community:</p>
                        <a href="https://x.com/nothiro__" target="_blank" class="text-gradient-green" style="font-weight: 600; font-size: 1.1rem;">@nothiro__</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container-wide footer-content">
            <div class="logo">
                <img src="assets/logo.png" alt="Friday Logo">
                <span class="text-gradient-green">FRIDAY</span>
            </div>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
            </div>
            <div class="footer-copyright">
                © 2026 Project Friday.
            </div>
        </div>
    </footer>

    <script type="module" src="/main.js"></script>
</body>

</html>
