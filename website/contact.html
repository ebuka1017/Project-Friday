<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Project Friday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header id="header" class="glass">
        <div class="container-wide nav-content">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Friday Logo">
                <span class="text-gradient-blue">FRIDAY</span>
            </a>

            <nav class="nav-links">
                <a href="index.html">Product</a>
                <a href="about.html">Company</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="nav-actions">
                <button class="theme-toggle-btn glass" id="themeBtn" title="Toggle theme">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
                <button class="btn btn-primary" id="downloadNavBtn">Get Friday</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero section-padding">
            <div class="container">
                <div class="hero-content" data-reveal>
                    <h1 class="text-gradient-blue">Get in Touch</h1>
                    <p>Have questions or feedback? We'd love to hear from you.</p>
                </div>
                
                <div class="contact-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 80px;">
                    <div class="feature-card glass" data-reveal>
                        <div class="feature-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </div>
                        <h3>Email Us</h3>
                        <p>For support or business inquiries:</p>
                        <a href="mailto:isaacokwuzi@gmail.com" class="text-gradient-blue" style="font-weight: 600; font-size: 1.2rem;">isaacokwuzi@gmail.com</a>
                    </div>
                    
                    <div class="feature-card glass" data-reveal>
                        <div class="feature-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z" />
                            </svg>
                        </div>
                        <h3>Follow on X</h3>
                        <p>Direct updates and community:</p>
                        <a href="https://x.com/nothiro__" target="_blank" class="text-gradient-blue" style="font-weight: 600; font-size: 1.2rem;">@nothiro__</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container-wide footer-content">
            <div class="logo">
                <img src="assets/logo.png" alt="Friday Logo">
                <span class="text-gradient-blue">FRIDAY</span>
            </div>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
            </div>
            <div class="footer-copyright">
                © 2026 Project Friday.
            </div>
        </div>
    </footer>

    <script type="module" src="/main.js"></script>
</body>

</html>
